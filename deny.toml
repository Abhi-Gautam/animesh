# cargo-deny config. Run: `cargo deny check`
# Gates the dependency graph for CVEs, license compliance, and duplicate
# transitive versions. Runs in CI, not the local inner loop.

[advisories]
# Fail on any RUSTSEC advisory. `yanked` crates are also flagged.
yanked = "deny"
# Add advisory IDs here only with a written justification when a fix is blocked.
ignore = []

[licenses]
# Permissive set appropriate for an MIT-licensed personal binary.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
]
confidence-threshold = 0.9

[bans]
# Multiple versions of the same crate bloat the binary and slow builds.
# Start at `warn` so it surfaces without blocking; flip to `deny` once cleaned.
multiple-versions = "warn"
wildcard-dependencies = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
